# This workflow uploads the releases to the Maven Central Repository
name: Publish Release to Maven Central

on:
  release:
    types:
      - released
      - prereleased

concurrency:
  group: maven-central-release
  cancel-in-progress: false

env:
  SEMANTIC_VERSION: ${{ github.event.release.tag_name }}

jobs:
  upload-maven-central:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Build and sign packages
        run: ./gradlew --parallel javadoc assemble signMavenPublication
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PRIVATE_KEY_SECRET }}

      - name: Upload to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MVN_CENTRAL_LOGIN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MVN_CENTRAL_LOGIN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PRIVATE_KEY_SECRET }}

      - name: Notify Maven Central upload failure in Slack
        if: failure()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # C05NM8419JM is sda-dropwizard-commons-security
          payload: |
            channel: C05NM8419JM
            text: "${{ github.event.repository.name }}: Maven Central upload of ${{ github.event.release.tag_name }} failed."
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: Maven Central Upload
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: ":red_circle: Maven Central upload of *${{ github.event.repository.name }}:${{ github.event.release.tag_name }}* failed."
              - type: context
                elements:
                  - type: mrkdwn
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open workflow run>"
