dependencies {
  api "org.wiremock:wiremock-jetty12", {
    exclude group: 'com.fasterxml.jackson', module: 'jackson-bom'
    exclude group: 'net.minidev', module: 'json-smart'
    exclude group: 'commons-io', module: 'commons-io'
    // WireMock publishes these modules directly and they otherwise stay on the older Jetty line.
    exclude group: 'org.eclipse.jetty', module: 'jetty-server'
    exclude group: 'org.eclipse.jetty', module: 'jetty-proxy'
    exclude group: 'org.eclipse.jetty', module: 'jetty-alpn-server'
    exclude group: 'org.eclipse.jetty', module: 'jetty-alpn-java-server'
    exclude group: 'org.eclipse.jetty', module: 'jetty-alpn-java-client'
    exclude group: 'org.eclipse.jetty', module: 'jetty-alpn-client'
    exclude group: 'org.eclipse.jetty.http2', module: 'jetty-http2-server'
    exclude group: 'org.eclipse.jetty.ee10', module: 'jetty-ee10-servlets'
    exclude group: 'org.eclipse.jetty.ee10', module: 'jetty-ee10-webapp'
  }

  api 'org.eclipse.jetty:jetty-server'
  api 'org.eclipse.jetty:jetty-proxy'
  api 'org.eclipse.jetty:jetty-alpn-server'
  api 'org.eclipse.jetty:jetty-alpn-java-server'
  api 'org.eclipse.jetty:jetty-alpn-java-client'
  api 'org.eclipse.jetty:jetty-alpn-client'
  api 'org.eclipse.jetty.http2:jetty-http2-server'
  api 'org.eclipse.jetty.ee10:jetty-ee10-servlets'
  api 'org.eclipse.jetty.ee10:jetty-ee10-webapp'

  api 'net.minidev:json-smart'
  api 'commons-io:commons-io'

  testImplementation project(':sda-commons-server-testing')
}
